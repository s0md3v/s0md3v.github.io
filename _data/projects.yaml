- title: XSStrike
  href: https://github.com/s0md3v/XSStrike
  stars: 14853
  what: Most advanced XSS detection suite.
  why: Scanners usually just inject a list of payloads and see what sticks, missing
    context-aware vulnerabilities.
  how: It parses the page's HTML to understand the context of the reflection and generates
    working payloads on the fly.
- title: Arjun
  href: https://github.com/s0md3v/Arjun
  stars: 6169
  what: HTTP parameter discovery suite.
  why: Web apps often have hidden parameters that are vulnerable to attacks, but they
    aren't linked anywhere in the UI.
  how: It makes smart requests with giant lists of parameter names to figure out what
    the server accepts, while bypassing rate limits.
- title: Photon
  href: https://github.com/s0md3v/Photon
  stars: 12777
  what: Incredibly fast crawler designed for OSINT.
  why: Extracting intelligence from a target manually is painful, and standard web
    crawlers aren't built for reconnaissance.
  how: Uses multi-threading to rapidly crawl domains and extract URLs, emails, social
    accounts, and keys into a neat structure.
- title: Smap
  href: https://github.com/s0md3v/Smap
  stars: 3204
  what: A drop-in nmap replacement powered by shodan.io.
  why: Active port scanning is inherently noisy and gets your IP address blocked by
    firewalls.
  how: It queries Shodan's API and perfectly mimics nmap's CLI arguments and output.
- title: Silver
  href: https://github.com/s0md3v/Silver
  stars: 1048
  what: Mass vulnerability scanner.
  why: Running nmap and masscan manually against huge networks gets messy and is hard
    to scale efficiently.
  how: Acts as a frontend wrapper that parses target data, spawns parallel scanning
    processes, and caches vulnerability info.
- title: uro
  href: https://github.com/s0md3v/uro
  stars: 1541
  what: Declutters URL lists for crawling and pentesting.
  why: Wayback machine and crawlers give you huge lists of URLs, but most of them
    are basically duplicates with different parameter values.
  how: It parses URL paths and parameters to mathematically filter out the redundant
    ones, leaving you with just the unique attack surface.
- title: hardcodes
  href: https://github.com/s0md3v/hardcodes
  stars: 285
  what: Extracts hardcoded strings from source code.
  why: Developers accidentally leave API keys and sensitive info inside strings, and
    normal greping gets messy with comments.
  how: Uses a modular tokenizer that actually understands comments and string syntax
    across over 20 different programming languages.
- title: Orbit
  href: https://github.com/s0md3v/Orbit
  stars: 597
  what: Blockchain transactions investigation tool.
  why: Tracking cryptocurrency moving through tons of different wallets is a nightmare
    without visualizing the flow.
  how: It crawls transaction history across multiple blocks and draws a comprehensive
    relationship graph between addresses.
- title: huepy
  href: https://github.com/s0md3v/huepy
  stars: 1488
  what: Python library to print awesomely in terminals.
  why: Adding colored text in CLI tools shouldn't require memorizing ugly ANSI escape
    codes and writing boilerplate.
  how: Gives you a clean API with simple semantic functions to add colors, backgrounds,
    and markers to your script's output.
- title: Be-a-hacker
  href: https://github.com/s0md3v/be-a-hacker
  stars: 2651
  what: Roadmap for a self-taught hacker.
  why: Information security is overwhelming for beginners without a clear, structured
    learning path.
  how: Lays out a curated, step-by-step syllabus using free resources to learn networking,
    Linux, and web application hacking.
